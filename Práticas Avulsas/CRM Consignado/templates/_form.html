<div class="form-grid" id="propostaFormGrid" data-refin-vinculado="{{ 'true' if proposta_eh_refin_vinculado(proposta) else 'false' }}">
    <label>Nome do cliente{% if modo_nova %} *{% endif %}
        <input id="proposta-nome" name="nome" value="{{ proposta.nome or proposta['nome'] or '' }}" {% if modo_nova %}required{% endif %}>
    </label>
    <label>CPF{% if modo_nova %} *{% endif %}
        <input id="proposta-cpf" name="cpf" class="cpf-mask" value="{{ proposta.cpf or proposta['cpf'] or '' }}" placeholder="000.000.000-00" {% if modo_nova %}required{% endif %}>
    </label>
    <label>Data de nascimento
        <input id="proposta-nascimento" name="nascimento" value="{{ proposta.nascimento or proposta['nascimento'] or '' }}" placeholder="DD/MM/AAAA">
    </label>
    <label>NB ou matrícula{% if modo_nova %} *{% endif %}
        <input id="proposta-nb-matricula" name="nb_matricula" value="{{ proposta.nb_matricula or proposta['nb_matricula'] or '' }}" {% if modo_nova %}required{% endif %}>
        <small class="muted cliente-sugestao-ajuda">Digite o CPF para consultar matrículas já cadastradas.</small>
        <select id="cliente-matricula-select" class="cliente-matricula-select hidden" aria-label="Matrículas encontradas para este CPF">
            <option value="">Selecione uma matrícula cadastrada</option>
        </select>
    </label>
    <label>Espécie do benefício
        <input id="proposta-especie" name="especie" value="{{ proposta.especie or proposta['especie'] or '' }}" placeholder="Ex.: 21, 32, 41">
    </label>
    <label>Nº proposta
        <input name="numero_proposta" value="{{ proposta.numero_proposta or proposta['numero_proposta'] or '' }}" placeholder="Número desta proposta">
    </label>
    <label>Tipo de cliente
        <select name="tipo_cliente">
            <option value="">Selecione</option>
            {% for tipo in TIPOS_CLIENTE %}
                <option value="{{ tipo }}" {% if (proposta.tipo_cliente or proposta['tipo_cliente'] or '') == tipo %}selected{% endif %}>{{ tipo }}</option>
            {% endfor %}
        </select>
    </label>
    <label data-portability-field {% if not produto_tem_campos_portabilidade(proposta.produto or proposta['produto'] or '') %}hidden{% endif %}>Banco atual
        <input name="banco_atual" value="{{ proposta.banco_atual or proposta['banco_atual'] or '' }}">
    </label>
    <label>Banco digitado
        <input name="banco_digitado" value="{{ proposta.banco_digitado or proposta['banco_digitado'] or '' }}" placeholder="Banco onde a proposta foi digitada">
    </label>
    <label>Produto{% if modo_nova %} *{% endif %}
        <select name="produto" id="propostaProduto" {% if modo_nova %}required{% endif %}>
            <option value="">Selecione</option>
            {% for produto in PRODUTOS %}
                <option value="{{ produto }}" {% if (proposta.produto or proposta['produto'] or '') == produto %}selected{% endif %}>{{ produto }}</option>
            {% endfor %}
        </select>
    </label>
    <label class="linked-proposal-field" data-refin-vinculado-field {% if not proposta_eh_refin_vinculado(proposta) %}hidden{% endif %}>Nº port vinculada
        <input name="numero_port_vinculada" value="{{ proposta.numero_port_vinculada or proposta['numero_port_vinculada'] or '' }}" placeholder="Portabilidade vinculada" readonly>
    </label>
    <label class="linked-proposal-field" data-linked-refin-field {% if not produto_tem_campos_vinculo(proposta.produto or proposta['produto'] or '') %}hidden{% endif %}>Nº refin vinculado
        <input name="numero_refin_vinculada" value="{{ proposta.numero_refin_vinculada or proposta['numero_refin_vinculada'] or '' }}" placeholder="Refinanciamento vinculado">
    </label>
    <label>Promotora
        <input name="promotora" value="{{ proposta.promotora or proposta['promotora'] or '' }}" placeholder="Ex.: Única, Vieira">
    </label>
    <label>Benefício bloqueado
        <select name="beneficio_bloqueado">
            {% set bloqueado = proposta.beneficio_bloqueado or proposta['beneficio_bloqueado'] or 'NÃO' %}
            <option value="NÃO" {% if bloqueado == 'NÃO' %}selected{% endif %}>NÃO</option>
            <option value="SIM" {% if bloqueado == 'SIM' %}selected{% endif %}>SIM</option>
        </select>
    </label>
    <label>Valor caiu na promotora
        <select name="valor_caiu_promotora">
            {% set caiu = proposta.valor_caiu_promotora or proposta['valor_caiu_promotora'] or 'NÃO' %}
            <option value="NÃO" {% if caiu == 'NÃO' %}selected{% endif %}>NÃO</option>
            <option value="SIM" {% if caiu == 'SIM' %}selected{% endif %}>SIM</option>
        </select>
    </label>
    <label>Valor já foi sacado
        <select name="valor_sacado">
            {% set sacado = proposta.valor_sacado or proposta['valor_sacado'] or 'NÃO' %}
            <option value="NÃO" {% if sacado == 'NÃO' %}selected{% endif %}>NÃO</option>
            <option value="SIM" {% if sacado == 'SIM' %}selected{% endif %}>SIM</option>
        </select>
    </label>
    <label>Status
        <select name="status">
            {% for status in STATUS_LIST %}
                <option value="{{ status }}" {% if (proposta.status or proposta['status'] or '') == status %}selected{% endif %}>{{ status }}</option>
            {% endfor %}
        </select>
    </label>
    <label>Parcela atual
        <input name="parcela_atual" class="money-mask" value="{{ br_moeda(proposta.parcela_atual or proposta['parcela_atual'] or 0) }}">
    </label>
    <label data-portability-field {% if not produto_tem_campos_portabilidade(proposta.produto or proposta['produto'] or '') %}hidden{% endif %}>Nova parcela
        <input name="nova_parcela" class="money-mask" value="{{ br_moeda(proposta.nova_parcela or proposta['nova_parcela'] or 0) }}">
    </label>
    <label>Valor
        <input name="troco" class="money-mask" value="{{ br_moeda(proposta.troco or proposta['troco'] or 0) }}">
    </label>
    <label>% comissão
        <input name="comissao_percentual" class="percent-mask" value="{{ proposta.comissao_percentual or proposta['comissao_percentual'] or '' }}" placeholder="Ex.: 3,5">
    </label>
    <label>Comissão
        <input name="comissao" class="money-mask" value="{{ br_moeda(proposta.comissao or proposta['comissao'] or 0) }}">
    </label>
    <label data-portability-field {% if not produto_tem_campos_portabilidade(proposta.produto or proposta['produto'] or '') %}hidden{% endif %}>Margem após operação
        <input name="margem_apos" value="{{ proposta.margem_apos or proposta['margem_apos'] or '' }}">
    </label>
    <label>Telefone/WhatsApp{% if modo_nova %} *{% endif %}
        <input id="proposta-telefone" name="telefone" value="{{ proposta.telefone or proposta['telefone'] or '' }}" {% if modo_nova %}required{% endif %}>
    </label>
    <label>Previsão de saldo
        <input type="date" name="data_retorno" value="{{ proposta.data_retorno or proposta['data_retorno'] or '' }}">
    </label>
</div>
<section class="proposal-form-free-section">
    <h3>Endereço do cliente</h3>
    <label class="full-label">
        <textarea id="proposta-endereco" name="endereco" rows="4" placeholder="Endereço&#10;RUA EXEMPLO 123&#10;CEP 00000000&#10;Bairro CENTRO&#10;Cidade - UF EXEMPLO - ES">{{ proposta.endereco or proposta['endereco'] or '' }}</textarea>
    </label>
</section>
<section class="proposal-form-free-section">
    <h3>Dados bancários do cliente</h3>
    <label class="full-label">
        <textarea id="proposta-dados-bancarios" name="dados_bancarios" rows="4" placeholder="BANCO EXEMPLO&#10;Agência: 123&#10;Conta Corrente: 000000000">{{ proposta.dados_bancarios or proposta['dados_bancarios'] or '' }}</textarea>
    </label>
</section>
<section class="proposal-form-free-section">
    <h3>Observação inicial/importada</h3>
    <label class="full-label">
        <textarea id="proposta-observacoes" name="observacoes" rows="5" placeholder="Use este campo apenas para a primeira observação. Depois, registre novas anotações na tela de detalhes da proposta.">{{ proposta.observacoes or proposta['observacoes'] or '' }}</textarea>
    </label>
</section>
